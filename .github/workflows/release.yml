name: Build and Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.21'

      - name: Get version
        id: version
        run: |
          $version = "${{ github.ref_name }}" -replace '^v', ''
          echo "VERSION=$version" >> $env:GITHUB_OUTPUT

      - name: Build all platforms
        run: .\scripts\build.ps1 -Version ${{ steps.version.outputs.VERSION }}

      - name: Package
        run: .\scripts\package.ps1 -Version ${{ steps.version.outputs.VERSION }}

      - name: Build MSI
        run: .\scripts\build-msi.ps1 -Version ${{ steps.version.outputs.VERSION }}

      - name: Upload zip packages
        uses: actions/upload-artifact@v4
        with:
          name: packages
          path: dist/packages/

      - name: Upload MSI
        uses: actions/upload-artifact@v4
        with:
          name: msi
          path: dist/pvm-windows-*.msi

      - name: Upload checksums
        uses: actions/upload-artifact@v4
        with:
          name: checksums
          path: dist/checksums.txt

  release:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Download packages
        uses: actions/download-artifact@v4
        with:
          name: packages
          path: packages/

      - name: Download MSI
        uses: actions/download-artifact@v4
        with:
          name: msi
          path: msi/

      - name: Download checksums
        uses: actions/download-artifact@v4
        with:
          name: checksums
          path: .

      # 用脚本获取 MSI 文件名，方便写 Release body
      - name: Get MSI filename
        id: msi
        run: |
          MSI_FILE=$(ls msi/pvm-windows-*.msi | head -1)
          echo "MSI_NAME=$(basename "$MSI_FILE")" >> $GITHUB_OUTPUT

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          name: PVM ${{ github.ref_name }}
          body: |
            ## PVM ${{ github.ref_name }}

            ### Windows 安装包（推荐）

            | 类型 | 说明 | 下载 |
            |------|------|------|
            | MSI 安装包 | 双击安装，自动配置 PATH | [pvm-${{ github.ref_name }}-windows-amd64.msi](${{ github.server_url }}/${{ github.repository }}/releases/download/${{ github.ref_name }}/pvm-${{ github.ref_name }}-windows-amd64.msi) |

            ### 平台二进制包

            | Platform | Arch | File |
            |----------|------|------|
            | Windows | x64 | `pvm-${{ github.ref_name }}-windows-amd64.zip` |
            | Windows | ARM64 | `pvm-${{ github.ref_name }}-windows-arm64.zip` |
            | macOS | x64 | `pvm-${{ github.ref_name }}-darwin-amd64.zip` |
            | macOS | ARM64 | `pvm-${{ github.ref_name }}-darwin-arm64.zip` |
            | Linux | x64 | `pvm-${{ github.ref_name }}-linux-amd64.zip` |
            | Linux | ARM64 | `pvm-${{ github.ref_name }}-linux-arm64.zip` |

            ### 安装

            **Windows（推荐 MSI 安装包）：**
            ```powershell
            # 下载上方 MSI 文件，双击安装
            # 或通过命令行安装：
            msiexec /i pvm-${{ github.ref_name }}-windows-amd64.msi /quiet
            ```

            **Windows (PowerShell)：**
            ```powershell
            irm https://get.pvm.dev | iex
            ```

            **macOS / Linux：**
            ```bash
            curl -fsSL https://get.pvm.dev | sh
            ```

            ### 校验

            下载后验证文件完整性：
            ```bash
            sha256sum -c checksums.txt
            ```

            ---

            **Full Changelog**: https://github.com/${{ github.repository }}/compare/v0.0.0...${{ github.ref_name }}
          files: |
            packages/*
            msi/*
            checksums.txt
          draft: false
          prerelease: false
